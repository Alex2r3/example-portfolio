<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mensaje Enviado | Alexander Vasquez</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="d-flex align-items-center justify-content-center" style="min-height:100vh">
        <div class="card-dark text-center" style="max-width:480px;width:90%;padding:50px 36px;border-radius:20px;animation:fadeUp .8s ease forwards;opacity:0">
            <div style="width:80px;height:80px;background:linear-gradient(135deg,#fff,#ccc);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 24px;font-size:2.2rem;color:#0a0a0a">
                <i class="bi bi-check-lg"></i>
            </div>
            <p style="color:#ccc;font-weight:600;font-size:1.1rem;margin-bottom:8px">¡Mensaje recibido!</p>
            <h2 class="fw-bold mb-3">Muy pronto nos pondremos en contacto</h2>
            <p style="color:var(--text2);margin-bottom:28px">Gracias por escribirme. Te responderé lo antes posible.</p>
            <a href="/" class="btn-main"><i class="bi bi-arrow-left"></i> Volver al Portafolio</a>
            <p style="color:var(--muted);font-size:.85rem;margin-top:16px">Redirigido en <span id="timer">10</span>s</p>
        </div>
    </div>
    <style>@keyframes fadeUp{to{opacity:1;transform:translateY(0)}} div[style*="fadeUp"]{transform:translateY(20px)}</style>
    <script>let s=10;const t=document.getElementById('timer');setInterval(()=>{s--;t.textContent=s;if(s<=0)window.location.href='/'},1000);</script>
</body>
</html>
